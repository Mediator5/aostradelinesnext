<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d095f" />
      <stop offset="50%" stop-color="#160647" />
      <stop offset="100%" stop-color="#0b0324" />
    </linearGradient>
    
    <linearGradient id="wave-grad-1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#522dcc" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#3e1ea8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#1d095f" stop-opacity="0.1" />
    </linearGradient>
    
    <linearGradient id="wave-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3e1ea8" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#2d1385" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#1d095f" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="wave-grad-3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b42ed" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#522dcc" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#1d095f" stop-opacity="0" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)" />

  <!-- Ambient Glows -->
  <circle cx="1500" cy="200" r="400" fill="#522dcc" opacity="0.15" filter="url(#glow-soft)" />
  <circle cx="200" cy="800" r="500" fill="#3e1ea8" opacity="0.1" filter="url(#glow-soft)" />

  <!-- Particles -->
  <g fill="#8c6bf2" opacity="0.4">
    <circle cx="300" cy="250" r="2" />
    <circle cx="850" cy="150" r="3" />
    <circle cx="1400" cy="450" r="1.5" />
    <circle cx="1700" cy="850" r="2.5" />
    <circle cx="400" cy="750" r="2" />
    <circle cx="1100" cy="900" r="3" />
    <circle cx="700" cy="550" r="1.5" />
    <circle cx="150" cy="500" r="2" />
    <circle cx="1800" cy="300" r="2" />
    <circle cx="950" cy="800" r="1.5" />
  </g>

  <!-- Secondary Wave (Background) -->
  <path d="M-200 800 C 400 900, 1000 400, 2100 200 L 2100 1200 L -200 1200 Z" fill="url(#wave-grad-2)" filter="url(#glow)" />
  
  <!-- Tertiary Wave -->
  <path d="M-200 1000 C 600 1100, 1200 600, 2100 400 L 2100 1200 L -200 1200 Z" fill="url(#wave-grad-3)" opacity="0.7" />

  <!-- Primary Sweeping Wave (Foreground) -->
  <path d="M-200 1100 C 500 1100, 900 500, 2100 -100 L 2100 1200 L -200 1200 Z" fill="url(#wave-grad-1)" filter="url(#glow)" />
  
  <!-- Highlight on Primary Wave -->
  <path d="M-200 1100 C 500 1100, 900 500, 2100 -100" fill="none" stroke="#8c6bf2" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  <path d="M-200 1000 C 600 1100, 1200 600, 2100 400" fill="none" stroke="#6b42ed" stroke-width="2" opacity="0.4" filter="url(#glow)" />

</svg>
